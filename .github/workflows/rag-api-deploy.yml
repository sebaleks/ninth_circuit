name: RAG API deploy

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - rag_api/**
      - data/**
      - render.yaml
      - .github/workflows/rag-api-deploy.yml

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK secret is not set" >&2
            exit 1
          fi
          echo "Triggering Render deploy…"
          status=$(curl -sS -X POST -o /tmp/body -w "%{http_code}" "$DEPLOY_HOOK")
          echo "HTTP $status — $(cat /tmp/body)"
          if [ "$status" -ge 400 ]; then
            echo "❌ Deploy hook returned HTTP $status" >&2
            exit 1
          fi
